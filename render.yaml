# La Paisley — Render Blueprint
# 資料庫已遷移至 Supabase（D6），不再使用 Render PostgreSQL。
# 部署前請在 Render Dashboard → Environment 填入下方所有 sync: false 的變數。

services:
  - type: web
    name: la-paisley
    runtime: node
    plan: standard
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      # === Auth ===
      - key: JWT_SECRET
        generateValue: true

      # === Database (Supabase) ===
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"

      # === CORS / 網域 ===
      - key: ALLOWED_ORIGINS
        sync: false        # 例: https://lapaisley.com,https://www.lapaisley.com

      # === LINE Messaging API（店家通知） ===
      - key: LINE_MESSAGING_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_MESSAGING_CHANNEL_SECRET
        sync: false
      - key: LINE_TARGET_ID
        sync: false

      # === LINE Login（客戶登入） ===
      - key: LINE_LOGIN_CHANNEL_ID
        sync: false
      - key: LINE_LOGIN_CHANNEL_SECRET
        sync: false
      - key: LINE_LOGIN_CALLBACK_URL
        sync: false        # 例: https://lapaisley.com/api/auth/line/callback

      # === LIFF（LINE App 內預約） ===
      - key: LINE_LIFF_ID
        sync: false

      # === 預約時區 ===
      - key: BOOKING_TZ_OFFSET_MINUTES
        value: "480"

  # ─────────────────────────────────────────────────────────────
  # Cron：預約提醒（D3）
  # 每整點執行一次；程式內讀 settings.reminderTime 決定是否真正發送，
  # 店家在後台改提醒時間 → 同日下個整點生效，無需重新部署。
  - type: cron
    name: la-paisley-reminders
    runtime: node
    schedule: "0 * * * *"
    buildCommand: cd server && npm install
    startCommand: cd server && node jobs/sendReminders.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: LINE_MESSAGING_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: BOOKING_TZ_OFFSET_MINUTES
        value: "480"
