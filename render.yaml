databases:
  - name: la-paisley-db
    plan: free
    databaseName: la_paisley
    user: la_paisley

services:
  - type: web
    name: la-paisley
    runtime: node
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: la-paisley-db
          property: connectionString
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_TARGET_ID
        sync: false
      - key: LINE_NOTIFY_TOKEN
        sync: false
